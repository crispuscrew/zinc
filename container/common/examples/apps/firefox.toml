schema_version = 1

[app]
name        = "firefox"
image       = "docker.io/library/alpine@sha256:48b0309ca019d89d40f670aa1bc06e426dc0931948452e8491e3d65087abc07d"  # base pinned by digest (third-party), §5.5
install     = "apk add --no-cache firefox font-dejavu"  # derived image: FROM image + this RUN layer (§5.5, §9.1)
command     = ["firefox"]
preset      = "strict"
description = "Web browser"
icon        = "firefox"
background  = false
autostart   = false
autostart_workspace = 0

[display]
wayland = "security-context"
gpu     = false

[network]
mode = "none"

[audio]
pipewire    = false
legacy_alsa = false

[theme]
mode = "host"

[capabilities]
extra = []

[depends_on]
containers = []
