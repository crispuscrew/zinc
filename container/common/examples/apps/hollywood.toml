schema_version = 1

# Quick-setup example (§5.5, §9.1): take a stock, digest-pinned distro image and
# install the program you actually want, instead of authoring a Containerfile.
# `install` builds a derived image (FROM image + RUN install); `command` is the
# entrypoint run inside it. A run rebuilds the image when either line changes, or
# rebuild on demand with `hzc build hollywood`.

[app]
name        = "hollywood"
image       = "docker.io/library/debian@sha256:ed49f2fa955a92dd859d7e2bdd101138b6db7ca855af572212d910d4e1445cc2"  # base; digest-pinned (third-party), §5.5
install     = "apt-get update && apt-get install -y hollywood"  # apt for debian/ubuntu
command     = ["hollywood"]                              # entrypoint inside the derived image
preset      = "strict"
description = "Fake hacker terminal (demo of install + entrypoint)"
icon        = "utilities-terminal"
terminal    = true
background  = false
autostart   = false
autostart_workspace = 0

[display]
wayland = "security-context"
gpu     = false

[network]
mode = "none"

[audio]
pipewire    = false
legacy_alsa = false

[theme]
mode = "host"

[capabilities]
extra = []

[depends_on]
containers = []
