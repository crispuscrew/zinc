# INTENTIONALLY INVALID — this file exists so `hzp validate` has something real to
# reject. Do NOT copy it as a starting point; copy firefox.toml instead. Every
# "BUG:" below is a problem Validate reports, and it reports them all at once (§3)
# rather than stopping at the first — so one run shows every fix needed.

schema_version = 1

[app]
name        = "Firefox"          # BUG: uppercase; names are [a-z0-9._-], start alphanumeric
image       = "docker.io/library/firefox@sha256:abc123"
preset      = "paranoid"         # BUG: not a real preset (strict|standard|networked)
description = "Web browser"
autostart_workspace = -1         # BUG: must be >= 0 (0 = no preference)

[display]
wayland = "yolo"                 # BUG: must be security-context|passthrough
gpu     = false

[network]
mode      = "none"               # switched back to "none"…
ipv4_cidr = ["10.0.0.0/8"]       # BUG: stale allowlist — only valid under mode = "pasta"
ports     = [443]                # BUG: same — left over after a mode switch

[[mounts]]
host      = "/etc/hosts"
container = "/etc/hosts"
mode      = "readonly"           # BUG: must be ro|rw

[theme]
mode = "dark"                    # BUG: must be host|none
